<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AstroPixelsPlus Installer</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f19;
      color: white;
      text-align: center;
    }

    .header {
      padding: 25px;
      font-size: 24px;
      background: #111827;
    }

    .card {
      max-width: 700px;
      margin: 40px auto;
      background: #111827;
      padding: 25px;
      border-radius: 12px;
    }

    button {
      padding: 14px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      width: 100%;
    }

    button:hover {
      background: #2563eb;
    }

    .status {
      margin-top: 15px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<div class="header">
  AstroPixelsPlus USB Installer
</div>

<div class="card">

  <h2>Step 1 — Connect Device</h2>

  <button onclick="connectAndFlash()">
    CONNECT & FLASH
  </button>

  <div class="status" id="status">
    Waiting for device...
  </div>

</div>

<script type="module">
import { ESPLoader, Transport } from "https://unpkg.com/esptool-js@0.5.4/dist/web/index.js";

async function connectAndFlash() {
    const status = document.getElementById("status");

    try {
        status.innerText = "Requesting device...";

        // Open USB port
        const port = await navigator.serial.requestPort();
        await port.open({ baudRate: 115200 });

        status.innerText = "Connecting to ESP32...";

        const transport = new Transport(port);
        const loader = new ESPLoader({
            transport,
            baudrate: 115200,
        });

        await loader.main();

        status.innerText = "Flashing firmware...";

        // Your firmware file
        const firmwareResponse = await fetch("firmware/firmware.bin");
        const firmwareArrayBuffer = await firmwareResponse.arrayBuffer();

        await loader.flashData(
            firmwareArrayBuffer,
            0x10000 // standard app address
        );

        status.innerText = "Flash complete ✔ Restarting device";

        await loader.hardReset();

    } catch (err) {
        console.error(err);
        status.innerText = "Error: " + err.message;
    }
}
</script>

</body>
</html>
