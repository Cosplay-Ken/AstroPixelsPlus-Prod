<!DOCTYPE html>
<html>
<head>
  <title>My Firmware Installer</title>
  <!-- Link to the ESP Web Tools Script -->
  <script type="module" src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module"></script>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #1a1a1a; color: white; }
    .container { border: 1px solid #444; padding: 20px; display: inline-block; border-radius: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>AstroPixelsPlus Custom Installer</h1>
    <p>Connect your device via USB and click below.</p>
    
    <!-- The Custom Button -->
    <esp-web-install-button manifest="./manifest.json">
      <button slot="activate">Connect to Device</button>
    </esp-web-install-button>
  </div>
</body>
</html>
