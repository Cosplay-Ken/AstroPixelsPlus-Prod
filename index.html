<!DOCTYPE html>
<html>
<head>
  <title>My Firmware Installer</title>
  <!-- Link to the ESP Web Tools Script -->
  <script type="module" src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module"></script>
<style>
  body { 
    background-color: #f9f9f9; /* Light background */
    color: #333333;           /* Dark text for readability */
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    height: 100vh; 
    margin: 0; 
  }

  .card { 
    text-align: center; 
    border: 1px solid #ddd;   /* Subtle border */
    padding: 3rem; 
    border-radius: 12px; 
    background: white;        /* White card */
    box-shadow: 0 4px 15px rgba(0,0,0,0.05); /* Soft shadow for depth */
  }

  /* Optional: Make the button stand out more */
  button[slot="activate"] {
    background-color: #0366d6;
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
  }

  button[slot="activate"]:hover {
    background-color: #0256b9;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>AstroPixelsPlus Custom Installer</h1>
    <p>Connect your device via USB and click below.</p>
    
    <!-- The Custom Button -->
    <esp-web-install-button manifest="./manifest.json">
      <button slot="activate">Connect to Device</button>
    </esp-web-install-button>
  </div>
</body>
</html>
