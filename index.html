<script type="module">
import { ESPLoader, Transport } from "https://unpkg.com/esptool-js@0.5.4/dist/web/index.js";

const status = (msg) => {
    document.getElementById("status").innerText = msg;
};

async function connectAndFlash() {
    try {
        status("Requesting USB device...");

        const port = await navigator.serial.requestPort();
        await port.open({ baudRate: 115200 });

        const transport = new Transport(port);

        status("Connecting to ESP32 (hold BOOT if needed)...");

        const loader = new ESPLoader({
            transport,
            baudrate: 115200,
        });

        await loader.main();

        status("ESP32 detected ✔ Loading firmware...");

        const firmwareURL = "https://cosplay-ken.github.io/astropixelsplus-prod/firmware/firmware.bin";
const firmware = await fetch(firmwareURL).then(r => r.arrayBuffer());
            .then(r => r.arrayBuffer());

        status("Erasing flash...");

        await loader.eraseFlash();

        status("Flashing firmware...");

        await loader.writeFlash(
            firmware,
            0x10000   // standard app offset for ESP32 Arduino builds
        );

        status("Finalizing...");

        await loader.hardReset();

        status("Flash complete ✔ Device restarting");

    } catch (err) {
        console.error(err);
        status("ERROR: " + err.message);
    }
}

window.connectAndFlash = connectAndFlash;
</script>
