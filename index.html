<script type="module">
import * as esptool from "https://unpkg.com/esptool-js@0.5.4/dist/web/index.js";

const status = (msg) => {
    document.getElementById("status").innerText = msg;
};

async function connectAndFlash() {
    try {
        status("Requesting USB device...");

        const port = await navigator.serial.requestPort();
        await port.open({ baudRate: 115200 });

        status("Connecting to ESP32 bootloader...");

        const transport = new esptool.Transport(port);
        const loader = new esptool.ESPLoader({
            transport,
            baudrate: 115200
        });

        await loader.main();

        status("Loading firmware...");

        const resp = await fetch("firmware/firmware.bin");
        const firmware = await resp.arrayBuffer();

        status("Flashing... DO NOT DISCONNECT");

        await loader.writeFlash(
            firmware,
            0x10000
        );

        status("Flash complete ✔ Rebooting device");

        await loader.hardReset();

        status("Done ✔");

    } catch (e) {
        console.error(e);
        status("Error: " + e.message);
    }
}

// expose globally for button
window.connectAndFlash = connectAndFlash;
</script>
