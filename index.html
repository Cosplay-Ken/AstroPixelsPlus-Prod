<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AstroPixelsPlus Installer</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f19;
      color: #fff;
    }

    .header {
      padding: 25px;
      text-align: center;
      font-size: 26px;
      background: #111827;
      font-weight: bold;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 30px;
    }

    .card {
      background: #111827;
      padding: 25px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .title {
      font-size: 20px;
      margin-bottom: 10px;
    }

    .subtitle {
      opacity: 0.7;
      margin-bottom: 20px;
    }

    .install-btn {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    .install-btn:hover {
      background: #2563eb;
    }

    .small {
      font-size: 12px;
      opacity: 0.6;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="header">
  AstroPixelsPlus Firmware Installer
</div>

<div class="container">

  <div class="card">
    <div class="title">Step 1 — Prepare Installation</div>
    <div class="subtitle">
      This will download the latest firmware build for your device.
    </div>

    <button class="install-btn" onclick="startInstall()">
      INSTALL FIRMWARE
    </button>

    <div class="small">
      Make sure your device is ready before proceeding.
    </div>
  </div>

</div>

<script>
function startInstall() {
  // For now: trigger download
  window.location.href = "firmware/firmware.bin";
}
</script>

</body>
</html>
